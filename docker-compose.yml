services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Internal URL for Next.js to proxy `/api/*` requests to the backend
      API_URL: ${API_URL:-http://app:8001}
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    environment:
      # Connection strings for MCP servers (service names in docker network)
      # These env vars need to be read by mcp_manager.py
      NL2SQL_MCP_URL: http://mcp-nl2sql:8082/sse
      AGENTIC_MCP_URL: http://mcp-agentic:8081/sse
      # Pass through other env vars from .env
      ORACLE_NL2SQL_DSN: ${ORACLE_NL2SQL_DSN}
      ORACLE_NL2SQL_USER: ${ORACLE_NL2SQL_USER}
      ORACLE_NL2SQL_PASSWORD: ${ORACLE_NL2SQL_PASSWORD}
      ORACLE_NL2SQL_WALLET_PATH: /wallet
      ORACLE_NL2SQL_WALLET_PASSWORD: ${ORACLE_NL2SQL_WALLET_PASSWORD}
      # Override wallet and OCI paths for container
      ORACLE_WALLET_PATH: /wallet
      OCI_CONFIG_FILE: /root/.oci/config
    env_file:
      - .env
    volumes:
      # Mount local OCI config for SDK authentication (local dev only)
      - ${OCI_DIR:-~/.oci}:/root/.oci:ro
      # Mount Oracle Wallet
      - ${ORACLE_WALLET_PATH:-~/wallet}:/wallet:ro
    dns:
      - 169.254.169.254
      - 8.8.8.8
    depends_on:
      - mcp-nl2sql
      - mcp-agentic

  mcp-nl2sql:
    build:
      context: .
      dockerfile: Dockerfile.mcp_nl2sql
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      ORACLE_WALLET_PATH: /wallet
      ORACLE_NL2SQL_WALLET_PATH: /wallet
      OCI_CONFIG_FILE: /root/.oci/config
    dns:
      - 169.254.169.254
      - 8.8.8.8
    volumes:
      - ${OCI_DIR:-~/.oci}:/root/.oci:ro
      - ${ORACLE_WALLET_PATH:-~/wallet}:/wallet:ro

  mcp-agentic:
    build:
      context: .
      dockerfile: Dockerfile.mcp_agentic
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      OCI_CONFIG_FILE: /root/.oci/config
    dns:
      - 169.254.169.254
      - 8.8.8.8
    volumes:
      - ${OCI_DIR:-~/.oci}:/root/.oci:ro
